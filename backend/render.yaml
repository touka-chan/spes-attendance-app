services:
  - type: web
    name: spes-attendance-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn spes_backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.2
      - key: DJANGO_SETTINGS_MODULE
        value: spes_backend.settings
      - key: FIREBASE_SERVICE_ACCOUNT_KEY
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
